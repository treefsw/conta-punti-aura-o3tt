<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Conta Punti AURA O3TT</title>
  <meta name="theme-color" content="#000000" />
  <style>
    :root{
      --bg:#000000;
      --panel:#111111;
      --panel-2:#1a1a1a;
      --text:#f5f5f5;
      --muted:#b8b8b8;
      --yellow:#ffd400;
      --yellow-soft:rgba(255,212,0,.14);
      --green:#13c05a;
      --green-soft:rgba(19,192,90,.16);
      --red:#e5484d;
      --red-soft:rgba(229,72,77,.16);
      --border:rgba(255,255,255,.08);
      --shadow:0 12px 28px rgba(0,0,0,.35);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,212,0,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255,212,0,.06), transparent 24%),
        linear-gradient(180deg,#050505 0%,#000 100%);
      color:var(--text);
      min-height:100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .app{
      max-width:820px;
      margin:0 auto;
      padding:18px 14px 32px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .brand{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:var(--yellow);
      color:#000;
      font-size:12px;
      font-weight:900;
      letter-spacing:1.4px;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.05;
      color:var(--yellow);
    }

    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .pill{
      white-space:nowrap;
      background:var(--yellow-soft);
      color:var(--yellow);
      border:1px solid rgba(255,212,0,.20);
      padding:10px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.8px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-bottom:14px;
    }

    .stat-card,
    .panel,
    .player-card,
    .modal-box{
      background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
      background-color:var(--panel);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .stat-card{
      border-radius:var(--radius-lg);
      padding:14px;
    }

    .stat-label{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .stat-value{
      font-size:22px;
      font-weight:900;
    }

    .panel{
      border-radius:var(--radius-xl);
      padding:14px;
      margin-bottom:14px;
    }

    .input-wrap{
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }

    input{
      width:100%;
      border:1px solid var(--border);
      background:var(--panel-2);
      color:var(--text);
      border-radius:16px;
      padding:15px 14px;
      font-size:16px;
      outline:none;
    }

    input:focus{
      border-color:rgba(255,212,0,.35);
      box-shadow:0 0 0 3px rgba(255,212,0,.08);
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    button{
      border:0;
      border-radius:14px;
      padding:13px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:transform .08s ease, opacity .2s ease;
    }

    button:active{transform:scale(.98)}

    .btn-yellow{background:var(--yellow); color:#000}
    .btn-dark{
      background:#242424;
      color:#fff;
      border:1px solid rgba(255,255,255,.06);
    }
    .btn-red{background:var(--red); color:#fff}
    .btn-green{background:var(--green); color:#fff}

    .players-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:28px 18px;
      border:1px dashed rgba(255,255,255,.10);
      border-radius:24px;
      background:rgba(255,255,255,.02);
    }

    .player-card{
      border-radius:22px;
      padding:16px;
      position:relative;
      overflow:hidden;
    }

    .player-card.leader{
      border-color:rgba(255,212,0,.30);
      box-shadow:0 0 0 1px rgba(255,212,0,.08), var(--shadow);
    }

    .player-card.leader::before{
      content:"LEADER";
      position:absolute;
      top:12px;
      right:12px;
      background:var(--yellow);
      color:#000;
      font-size:11px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
    }

    .player-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .player-name{
      margin:0;
      font-size:22px;
      font-weight:900;
    }

    .player-sub{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .points-box{
      text-align:right;
    }

    .points{
      font-size:42px;
      line-height:1;
      font-weight:900;
      color:var(--yellow);
    }

    .points-label{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .score-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }

    .score-btn.minus{
      background:var(--red-soft);
      color:var(--red);
    }

    .score-btn.plus{
      background:var(--green-soft);
      color:var(--green);
    }

    .meta-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .meta-btn{
      background:#1c1c1c;
      color:#fff;
      border:1px solid rgba(255,255,255,.06);
      padding:11px 14px;
      font-size:14px;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,.72);
      backdrop-filter: blur(4px);
      z-index:1000;
    }

    .modal.open{display:flex}

    .modal-box{
      width:min(100%,420px);
      border-radius:24px;
      padding:18px;
    }

    .modal-title{
      margin:0 0 8px;
      font-size:22px;
      color:var(--yellow);
    }

    .modal-text{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.4;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media (max-width:640px){
      .topbar{flex-direction:column}
      .stats{grid-template-columns:1fr}
      .input-wrap{flex-direction:column}
      .player-top{flex-direction:column}
      .points-box{text-align:left}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <div class="brand">O3TT</div>
        <h1>Conta Punti AURA O3TT</h1>
        <p class="subtitle">Classifica rapida per allenamenti, giochi e challenge di squadra.</p>
      </div>
      <div class="pill">AURA MODE</div>
    </header>

    <section class="stats">
      <div class="stat-card">
        <span class="stat-label">Partecipanti</span>
        <div class="stat-value" id="statPlayers">0</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Leader</span>
        <div class="stat-value" id="statLeader">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Top score</span>
        <div class="stat-value" id="statTop">—</div>
      </div>
    </section>

    <section class="panel">
      <div class="input-wrap">
        <input id="nameInput" type="text" placeholder="Inserisci nome atleta" maxlength="24" />
        <button id="addBtn" class="btn-yellow">Aggiungi</button>
      </div>

      <div class="toolbar">
        <button id="sortBtn" class="btn-dark">Ordina classifica</button>
        <button id="resetAllBtn" class="btn-red">Reset totale</button>
      </div>
    </section>

    <section id="playersList" class="players-list"></section>
  </div>

  <div id="renameModal" class="modal" aria-hidden="true">
    <div class="modal-box">
      <h2 class="modal-title">Rinomina atleta</h2>
      <p class="modal-text">Inserisci il nuovo nome.</p>
      <input id="renameInput" type="text" maxlength="24" />
      <div class="modal-actions">
        <button id="renameCancelBtn" class="btn-dark">Annulla</button>
        <button id="renameConfirmBtn" class="btn-yellow">Salva</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal" aria-hidden="true">
    <div class="modal-box">
      <h2 class="modal-title">Elimina atleta</h2>
      <p class="modal-text" id="deleteText">Confermi eliminazione?</p>
      <div class="modal-actions">
        <button id="deleteCancelBtn" class="btn-dark">Annulla</button>
        <button id="deleteConfirmBtn" class="btn-red">Elimina</button>
      </div>
    </div>
  </div>

  <div id="resetAllModal" class="modal" aria-hidden="true">
    <div class="modal-box">
      <h2 class="modal-title">Reset totale</h2>
      <p class="modal-text">Tutti i punteggi torneranno a 100.</p>
      <div class="modal-actions">
        <button id="resetAllCancelBtn" class="btn-dark">Annulla</button>
        <button id="resetAllConfirmBtn" class="btn-red">Resetta tutti</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "aura_o3tt_players_v1";
    let players = loadPlayers();

    let renameTargetId = null;
    let deleteTargetId = null;

    const nameInput = document.getElementById("nameInput");
    const addBtn = document.getElementById("addBtn");
    const sortBtn = document.getElementById("sortBtn");
    const resetAllBtn = document.getElementById("resetAllBtn");
    const playersList = document.getElementById("playersList");

    const statPlayers = document.getElementById("statPlayers");
    const statLeader = document.getElementById("statLeader");
    const statTop = document.getElementById("statTop");

    const renameModal = document.getElementById("renameModal");
    const renameInput = document.getElementById("renameInput");
    const renameCancelBtn = document.getElementById("renameCancelBtn");
    const renameConfirmBtn = document.getElementById("renameConfirmBtn");

    const deleteModal = document.getElementById("deleteModal");
    const deleteText = document.getElementById("deleteText");
    const deleteCancelBtn = document.getElementById("deleteCancelBtn");
    const deleteConfirmBtn = document.getElementById("deleteConfirmBtn");

    const resetAllModal = document.getElementById("resetAllModal");
    const resetAllCancelBtn = document.getElementById("resetAllCancelBtn");
    const resetAllConfirmBtn = document.getElementById("resetAllConfirmBtn");

    function vibrate(ms = 20) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function makeId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return String(Date.now() + Math.random());
    }

    function loadPlayers() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function savePlayers() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
    }

    function sortPlayers() {
      players.sort((a, b) => b.points - a.points || a.name.localeCompare(b.name, "it"));
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateStats() {
      statPlayers.textContent = players.length;

      if (players.length === 0) {
        statLeader.textContent = "—";
        statTop.textContent = "—";
        return;
      }

      sortPlayers();
      statLeader.textContent = players[0].name;
      statTop.textContent = players[0].points + " pt";
    }

    function renderPlayers() {
      sortPlayers();
      updateStats();

      if (players.length === 0) {
        playersList.innerHTML = `<div class="empty">Nessun atleta inserito. Aggiungi il primo nome per iniziare.</div>`;
        return;
      }

      playersList.innerHTML = players.map((player, index) => `
        <article class="player-card ${index === 0 ? "leader" : ""}">
          <div class="player-top">
            <div>
              <h3 class="player-name">${escapeHtml(player.name)}</h3>
              <div class="player-sub">Posizione #${index + 1}</div>
            </div>

            <div class="points-box">
              <div class="points">${player.points}</div>
              <div class="points-label">pt aura</div>
            </div>
          </div>

          <div class="score-actions">
            <button class="score-btn minus" data-action="minus" data-id="${player.id}">-1</button>
            <button class="score-btn plus" data-action="plus" data-id="${player.id}">+1</button>
          </div>

          <div class="meta-actions">
            <button class="meta-btn" data-action="rename" data-id="${player.id}">Rinomina</button>
            <button class="meta-btn" data-action="reset" data-id="${player.id}">Reset 100</button>
            <button class="meta-btn" data-action="delete" data-id="${player.id}">Elimina</button>
          </div>
        </article>
      `).join("");
    }

    function render() {
      renderPlayers();
    }

    function addPlayer() {
      const name = nameInput.value.trim();
      if (!name) return;

      const existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        openRenameModal(existing.id, existing.name);
        return;
      }

      players.push({
        id: makeId(),
        name,
        points: 100
      });

      nameInput.value = "";
      savePlayers();
      render();
      vibrate(30);
    }

    function changePoints(id, delta) {
      const player = players.find(p => p.id === id);
      if (!player) return;
      player.points += delta;
      savePlayers();
      render();
      vibrate(18);
    }

    function resetPlayer(id) {
      const player = players.find(p => p.id === id);
      if (!player) return;
      player.points = 100;
      savePlayers();
      render();
      vibrate(24);
    }

    function openRenameModal(id, currentName) {
      renameTargetId = id;
      renameInput.value = currentName || "";
      renameModal.classList.add("open");
      renameInput.focus();
      renameInput.select();
    }

    function closeRenameModal() {
      renameModal.classList.remove("open");
      renameTargetId = null;
    }

    function confirmRename() {
      const player = players.find(p => p.id === renameTargetId);
      if (!player) return closeRenameModal();

      const newName = renameInput.value.trim();
      if (!newName) return;

      player.name = newName;
      savePlayers();
      render();
      closeRenameModal();
      vibrate(28);
    }

    function openDeleteModal(id) {
      const player = players.find(p => p.id === id);
      if (!player) return;
      deleteTargetId = id;
      deleteText.textContent = `Confermi eliminazione di ${player.name}?`;
      deleteModal.classList.add("open");
    }

    function closeDeleteModal() {
      deleteModal.classList.remove("open");
      deleteTargetId = null;
    }

    function confirmDelete() {
      if (!deleteTargetId) return closeDeleteModal();
      players = players.filter(p => p.id !== deleteTargetId);
      savePlayers();
      render();
      closeDeleteModal();
      vibrate(34);
    }

    function openResetAllModal() {
      resetAllModal.classList.add("open");
    }

    function closeResetAllModal() {
      resetAllModal.classList.remove("open");
    }

    function confirmResetAll() {
      players = players.map(p => ({ ...p, points: 100 }));
      savePlayers();
      render();
      closeResetAllModal();
      vibrate(40);
    }

    addBtn.addEventListener("click", addPlayer);

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addPlayer();
    });

    sortBtn.addEventListener("click", () => {
      sortPlayers();
      savePlayers();
      render();
      vibrate(18);
    });

    resetAllBtn.addEventListener("click", openResetAllModal);

    playersList.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const id = btn.dataset.id;
      const action = btn.dataset.action;

      if (action === "plus") changePoints(id, 1);
      if (action === "minus") changePoints(id, -1);
      if (action === "reset") resetPlayer(id);
      if (action === "rename") {
        const player = players.find(p => p.id === id);
        if (player) openRenameModal(id, player.name);
      }
      if (action === "delete") openDeleteModal(id);
    });

    renameCancelBtn.addEventListener("click", closeRenameModal);
    renameConfirmBtn.addEventListener("click", confirmRename);
    deleteCancelBtn.addEventListener("click", closeDeleteModal);
    deleteConfirmBtn.addEventListener("click", confirmDelete);
    resetAllCancelBtn.addEventListener("click", closeResetAllModal);
    resetAllConfirmBtn.addEventListener("click", confirmResetAll);

    renameModal.addEventListener("click", (e) => {
      if (e.target === renameModal) closeRenameModal();
    });
    deleteModal.addEventListener("click", (e) => {
      if (e.target === deleteModal) closeDeleteModal();
    });
    resetAllModal.addEventListener("click", (e) => {
      if (e.target === resetAllModal) closeResetAllModal();
    });

    renameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") confirmRename();
    });

    render();
  </script>
</body>
</html>
